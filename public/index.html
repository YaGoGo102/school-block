<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>クラスルーム</title>
    <link rel="icon" type="https://www.xbox.com/ja-JP/play/games/fortnite/BT5P2X999VH2">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #121212; font-family: sans-serif; }
        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: #1a1a1a; display: flex; flex-direction: column; justify-content: center; align-items: center; color: #ffffff; z-index: 9999; }
        .spinner { border: 4px solid rgba(255, 255, 255, 0.1); width: 50px; height: 50px; border-radius: 50%; border-left-color: #09d; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        iframe { width: 100%; height: 100%; border: none; display: none; }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <p id="status-text" style="font-size: 18px; letter-spacing: 1px;">プロキシを起動中...</p>
        <p id="sub-text" style="font-size: 12px; color: #888;">初回は読み込みに10秒〜20秒かかる場合があります</p>
    </div>

    <iframe id="game-frame" allow="gamepad; fullscreen; autoplay; screen-wake-lock"></iframe>

    <!-- パスがズレても読み込めるように、ルート相対パス（/から始まる）に変更 -->
    <script src="/uv/uv.bundle.js" onerror="tryAlternativePath()"></script>
    <script src="/uv/uv.config.js"></script>

    <script>
        // 万が一、上のパスで404エラーが出た場合のバックアップ処理
        function tryAlternativePath() {
            console.log("標準パスで失敗したため、別ルートを試します...");
            const paths = ['uv.bundle.js', 'public/uv/uv.bundle.js'];
            // スクリプトを動的に再読み込みする処理をここに挟むか、警告を出します
        }

        window.addEventListener('DOMContentLoaded', () => {
            const targetUrl = "https://www.xbox.com/ja-JP/play/games/fortnite/BT5P2X999VH2";
            const frame = document.getElementById('game-frame');
            const loader = document.getElementById('loader');
            const statusText = document.getElementById('status-text');

            // 5秒待っても__uv$configが未定義なら、パスのエラーを表示
            const errorCheck = setTimeout(() => {
                if (typeof __uv$config === 'undefined') {
                    statusText.innerText = "エラー: スクリプトの読み込みに失敗しました。";
                    document.getElementById('sub-text').innerHTML = "【原因の可能性】<br>1. Cloudflareの設定で「Output directory」が間違っている<br>2. リポジトリのビルド(npm run build)が行われていない";
                    document.querySelector('.spinner').style.display = 'none';
                }
            }, 5000);

            function startProxy() {
                if (typeof __uv$config !== 'undefined') {
                    clearTimeout(errorCheck);
                    statusText.innerText = "フォートナイトに接続中...";
                    
                    const encodedUrl = __uv$config.prefix + __uv$config.encodeUrl(targetUrl);
                    frame.src = encodedUrl;

                    frame.onload = () => {
                        loader.style.display = 'none';
                        frame.style.display = 'block';
                    };
                }
            }

            // スクリプトが読み込まれるタイミングを待つために少し猶予を持たせる
            if (typeof __uv$config !== 'undefined') {
                startProxy();
            } else {
                // 定期的に読み込みをチェック
                const interval = setInterval(() => {
                    if (typeof __uv$config !== 'undefined') {
                        clearInterval(interval);
                        startProxy();
                    }
                }, 500);
            }
        });
    </script>
</body>
</html>
