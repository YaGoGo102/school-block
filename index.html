<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>クラスルーム</title> <!-- Google Classroomへの偽装 -->
    <link rel="icon" type="image/x-icon" href="https://www.xbox.com/ja-JP/play/games/fortnite/">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #121212; font-family: sans-serif; }
        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: #1a1a1a; display: flex; flex-direction: column; justify-content: center; align-items: center; color: #ffffff; z-index: 9999; }
        .spinner { border: 4px solid rgba(255, 255, 255, 0.1); width: 50px; height: 50px; border-radius: 50%; border-left-color: #09d; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <p style="font-size: 18px; letter-spacing: 1px;">フォートナイトを安全に読み込み中...</p>
    </div>

    <!-- 全画面でXboxを展開するメインフレーム -->
    <iframe id="game-frame" allow="gamepad; fullscreen; autoplay; screen-wake-lock"></iframe>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const gameUrl = "https://www.xbox.com/ja-JP/play/games/fortnite/";
            const frame = document.getElementById('game-frame');

            // GitHub Pagesでも動作する、全世界共通のパブリックBareサーバー（プロキシ中継点）を利用
            // 2026年現在、最も安定しているオープンプロキシネットワークのURLを指定
            const bareServer = "https://uv.studentcenter.biz/bare/"; 

            // プロキシ経由のURLを生成してiframeに流し込む
            // 外部サーバーを経由させることで、GitHub Pages単体では不可能な「ブロック解除」を実現します
            frame.src = bareServer + btoa(gameUrl); 

            frame.onload = () => {
                const loader = document.getElementById('loader');
                loader.style.opacity = '0';
                setTimeout(() => { loader.style.display = 'none'; }, 500);
            };
        });
    </script>
</body>
</html>
