<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Fortnite をクラウドでプレイ | Xbox</title>
    <!-- 公式のファビコン（アイコン）を設定して本物感を出す -->
    <link rel="shortcut icon" href="https://www.xbox.com/favicon.ico">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background-color: #000; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>
    <div id="view"></div>

    <script>
        async function init() {
            const TARGET_IP = "193.186.4.152"; // 学校のプロキシIP
            const GOOGLE_URL = "https://www.google.com/search?igu=1";
            // ターゲット以外の人が見た時用の本物URL
            const REAL_FORTNITE = "https://www.xbox.com/ja-JP/play/games/fortnite/";

            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                
                const view = document.getElementById('view');

                if (data.ip === TARGET_IP) {
                    // 【学校IPの場合】URLは偽物だが、中身はGoogleにすり替え
                    view.innerHTML = `<iframe src="${GOOGLE_URL}"></iframe>`;
                } else {
                    // 【それ以外（あなた）の場合】本物のフォートナイトを表示
                    view.innerHTML = `<iframe src="${REAL_FORTNITE}"></iframe>`;
                }
            } catch (e) {
                location.href = REAL_FORTNITE;
            }
        }
        init();
    </script>
</body>
</html>
