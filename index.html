<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>読み込み中...</title>
    <style>
        /* 画面全体にページを広げるための設定 */
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #000; }
        iframe { width: 100%; height: 100%; border: none; }
        #loading { color: #107c10; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; font-size: 1.5rem; background: #111; }
    </style>
</head>
<body>

    <div id="loading">Loading...</div>
    <div id="content" style="display:none; height:100%;"></div>

    <script>
        async function checkStatusAndLoad() {
            try {
                // あなたのGitHub上の status.json から現在の状態を読み込む（キャッシュ回避のためタイムスタンプを付与）
                const response = await fetch('https://yagogo102.github.io/school-block/status.json?t=' + new Date().getTime());
                const data = await response.json();

                const contentDiv = document.getElementById('content');
                const loadingDiv = document.getElementById('loading');
                
                loadingDiv.style.display = 'none';
                contentDiv.style.display = 'block';

                if (data.status === 'on') {
                    // 【ONのとき】タイトルをXboxに変え、本物のFortnite画面を全画面で表示
                    document.title = "Xbox Cloud Gaming";
                    contentDiv.innerHTML = `<iframe src="https://www.xbox.com/ja-JP/play/games/fortnite/"></iframe>`;
                } else {
                    // 【OFFのとき】タイトルをGoogleに変え、カモフラージュ用のGoogle検索を表示
                    document.title = "Google";
                    contentDiv.innerHTML = `<iframe src="https://www.google.com/search?igu=1"></iframe>`;
                }
            } catch (error) {
                // エラー（ファイルがない、通信エラーなど）が発生した場合は安全のためGoogleを表示
                document.getElementById('loading').style.display = 'none';
                document.getElementById('content').style.display = 'block';
                document.getElementById('content').innerHTML = `<iframe src="https://www.google.com/search?igu=1"></iframe>`;
            }
        }

        // ページにアクセスした瞬間に実行
        checkStatusAndLoad();
    </script>
</body>
</html>
