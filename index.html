<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Science Project</title> <!-- 学校対策用にタイトルを偽装 -->
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>
    <!-- プロキシのスクリプトを読み込む（リポジトリのパスに合わせて調整してください） -->
    <script src="uv/uv.bundle.js"></script>
    <script src="uv/uv.config.js"></script>
    
    <iframe id="game-frame"></iframe>

    <script>
        // ページ読み込み時にフォートナイトをプロキシ経由で開く
        window.onload = function() {
            const target = "https://www.xbox.com/ja-JP/play/games/fortnite/";
            if (window.__uv$config) {
                document.getElementById('game-frame').src = __uv$config.prefix + __uv$config.encodeUrl(target);
            }
        };
    </script>
</body>
</html>
