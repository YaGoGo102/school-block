<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>クラスルーム</title>
    <link rel="icon" type="image/x-icon" href="https://ssl.gstatic.com/classroom/favicon.png">
    <style>
        body { background-color: #121212; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .container { text-align: center; max-width: 500px; padding: 20px; }
        input[type="text"] { width: 80%; padding: 12px; border: 1px solid #333; background: #222; color: #fff; border-radius: 4px; margin-bottom: 10px; }
        button { padding: 12px 24px; background: #09d; border: none; color: #fff; border-radius: 4px; cursor: pointer; }
        iframe { position: fixed; top:0; left:0; width:100%; height:100%; border:none; display:none; }
    </style>
</head>
<body>

    <!-- 通常アクセス時に表示される普通のプロキシ検索画面 -->
    <div class="container" id="main-ui">
        <h2>ウェブ検索プロキシ</h2>
        <p style="color: #888; font-size: 14px;">ブロックを解除したいサイトのURLを入力してください</p>
        <input type="text" id="url-input" placeholder="https://google.com">
        <br>
        <button id="launch-btn">閲覧を開始</button>
    </div>

    <iframe id="proxy-frame" allow="gamepad; fullscreen; autoplay; screen-wake-lock"></iframe>

    <script>
        const bareServer = "https://uv.studentcenter.biz/bare/";
        const frame = document.getElementById('proxy-frame');
        const mainUi = document.getElementById('main-ui');

        // 通常の検索ボタンを押した時の処理
        document.getElementById('launch-btn').addEventListener('click', () => {
            let inputUrl = document.getElementById('url-input').value;
            if (!inputUrl) return;
            if (!inputUrl.startsWith('http')) inputUrl = 'https://' + inputUrl;

            frame.src = bareServer + btoa(inputUrl);
            mainUi.style.display = 'none';
            frame.style.display = 'block';
        });
    </script>
</body>
</html>
