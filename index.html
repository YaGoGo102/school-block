<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xbox Cloud Gaming</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #000; }
        iframe { width: 100%; height: 100%; border: none; }
        #loading { color: #107c10; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; font-size: 1.5rem; }
    </style>
</head>
<body>
    <div id="loading">読み込み中...</div>
    <div id="content" style="display:none; height:100%;"></div>

    <script>
        // 本来はここにSupabaseなどの初期化コードが入ります
        // 今回は動作ロジックが分かりやすいように記述しています
        async function checkCurrentMode() {
            try {
                // 遠隔データベースから現在の「オン・オフ」の状態を取得するAPIコール
                // 例: const { data } = await supabase.from('settings').select('status').single();
                
                // 擬似的に現在の状態を判定（データベースから 'off' が返ってきたと仮定）
                const currentStatus = "off"; 

                const contentDiv = document.getElementById('content');
                const loadingDiv = document.getElementById('loading');
                
                loadingDiv.style.display = 'none';
                contentDiv.style.display = 'block';

                if (currentStatus === "on") {
                    // オン：本物のXboxサイトを表示する
                    contentDiv.innerHTML = `<iframe src="https://www.xbox.com/ja-JP/play/games/fortnite/"></iframe>`;
                } else {
                    // オフ：カモフラージュ用のGoogle検索を表示する
                    contentDiv.innerHTML = `<iframe src="https://www.google.com/search?igu=1"></iframe>`;
                }
            } catch (error) {
                // エラー時は安全のためにGoogleを表示
                document.getElementById('loading').style.display = 'none';
                document.getElementById('content').style.display = 'block';
                document.getElementById('content').innerHTML = `<iframe src="https://www.google.com/search?igu=1"></iframe>`;
            }
        }

        // ページを開いた瞬間にチェックを実行
        checkCurrentMode();
    </script>
</body>
</html>
