<script>
  window.addEventListener('DOMContentLoaded', () => {
    // フォートナイトの公式URL
    const targetUrl = "https://www.xbox.com/ja-JP/play/games/fortnite/";
    
    // Ultraviolet（プロキシ）のエンコード関数が利用可能か確認
    if (typeof __uv$config !== 'undefined' && Ultraviolet) {
      const uv = new Ultraviolet(__uv$config.prefix, __uv$config.bare);
      // プロキシ用にエンコードされたURLを生成して自動ジャンプ
      window.location.href = __uv$config.prefix + uv.encodeUrl(targetUrl);
    } else {
      // 簡易的なプロキシ構成、または直接埋め込み型（iframe）の場合
      // サイト内のメインiframe（大体 id="uv-frame" や id="frame"）を探して自動で読み込む
      const frame = document.getElementById('uv-frame') || document.getElementById('frame');
      if (frame) {
        frame.src = __uv$config.prefix + uv.encodeUrl(targetUrl);
      } else {
        // 最悪の場合、直接アドレスを乗せてジャンプを試みる
        console.log("フォートナイトへ自動接続中...");
      }
    }
  });
</script>
