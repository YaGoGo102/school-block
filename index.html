<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>遠隔コントロールパネル</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 50px; background: #1a1a1a; color: #fff; }
        button { font-size: 1.2rem; padding: 15px 40px; margin: 20px; cursor: pointer; border: none; border-radius: 5px; font-weight: bold; }
        .btn-on { background: #107c10; color: white; }
        .btn-off { background: #d83b01; color: white; }
    </style>
</head>
<body>
    <h1>Xbox 遠隔スイッチ</h1>
    <p>スニペットを入れたブラウザの画面をコントロールします</p>
    
    <button class="btn-on" onclick="changeStatus('on')">ゲームを許可 (ON)</button>
    <button class="btn-off" onclick="changeStatus('off')">Googleに切り替え (OFF)</button>

    <script>
        async function changeStatus(newStatus) {
            // ここでクラウド上のデータベース（KVやFirestoreなど）の値を書き換えます
            // 例: await fetch('https://あなたのプロジェクト.pages.dev/api/update?status=' + newStatus);
            
            alert(`ステータスを [${newStatus}] に変更しました。`);
        }
    </script>
</body>
</html>
