<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>クラスルーム</title>
    <link rel="icon" type="image/x-icon" href="https://ssl.gstatic.com/classroom/favicon.png">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #121212; font-family: sans-serif; }
        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: #1a1a1a; display: flex; flex-direction: column; justify-content: center; align-items: center; color: #ffffff; z-index: 9999; }
        .spinner { border: 4px solid rgba(255, 255, 255, 0.1); width: 50px; height: 50px; border-radius: 50%; border-left-color: #09d; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        iframe { width: 100%; height: 100%; border: none; display: none; }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <p id="loading-text" style="font-size: 18px; letter-spacing: 1px;">読み込み中...</p>
    </div>

    <iframe id="game-frame" allow="gamepad; fullscreen; autoplay; screen-wake-lock"></iframe>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const currentPath = window.location.pathname;
            const bareServer = "https://uv.studentcenter.biz/bare/";
            const frame = document.getElementById('game-frame');
            const loader = document.getElementById('loader');
            const loadingText = document.getElementById('loading-text');

            // URLの末尾が「fortnite」または「fortnite/」の場合だけ特別処理
            if (currentPath.endsWith('/fortnite') || currentPath.endsWith('/fortnite/')) {
                loadingText.innerText = "フォートナイトを自動起動中...";
                const fortniteUrl = "https://www.xbox.com/ja-JP/play/games/fortnite/";
                
                frame.src = bareServer + btoa(fortniteUrl);
                frame.style.display = "block";

                frame.onload = () => {
                    loader.style.opacity = '0';
                    setTimeout(() => { loader.style.display = 'none'; }, 500);
                };
            } else {
                // それ以外の存在しないURLにアクセスされた場合は、普通のトップページに強制送還する
                window.location.href = window.location.origin + "/school-block/";
            }
        });
    </script>
</body>
</html>
